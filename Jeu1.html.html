<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Rallonges Gauche Uniques</title>
    <style>
        /* Fond Bleu Ciel de Marseille (lumineux et doux) */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #7ECFF4; 
            padding-top: 30px; /* Remonté pour être plus haut dans la page */
        }

        /* Titre Noir, positionné en haut */
        h1 {
            font-family: 'Georgia', serif;
            font-size: 1.75em;
            color: #000000;
            margin-bottom: 60px; /* Espace réduit pour remonter l'ensemble */
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Cadre central : Bleu Ciel, liseré noir fin, symétrie parfaite */
        #jeu-container { 
            text-align: center; 
            background: #7ECFF4; 
            /* Padding ajusté pour la symétrie haut/bas (60px partout) */
            padding: 60px 100px; 
            border-radius: 4px; 
            max-width: 90%;
            border: 1.5px solid #000000; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        /* Mot de base en Noir pur */
        #mot-de-base { 
            font-size: 3.5em; 
            font-weight: bold; 
            margin-bottom: 40px; /* Espace entre mot et rectangle de saisie */
            letter-spacing: 10px;
            color: #000000;
        }

        /* Petit rectangle Vert Pistache (basé sur votre image) */
        .cadre-saisie { 
            border: 2px solid #000000; 
            padding: 15px; 
            font-size: 2.5em; 
            width: 80px; 
            text-align: center; 
            text-transform: uppercase; 
            outline: none; 
            border-radius: 4px;
            background-color: #98D4B1; /* Vert Pistache clair et frais */
            color: #000000; 
        }

        #solution-container { 
            font-size: 2.5em; 
            font-weight: bold; 
            margin-top: 30px; 
            display: none; 
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 4px;
            color: #000000;
            border: 1px solid #000;
        }

        #message { font-size: 1.8em; font-weight: bold; margin: 20px 0; height: 1.5em; color: #000000; }
        .bravo { color: #2E7D32 !important; } 
        .erreur { color: #C62828 !important; }

        .btn-suivant { 
            padding: 12px 35px; 
            font-size: 1.1em; 
            background-color: #000000; 
            color: #FFFFFF;
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            display: none; 
            margin: 20px auto 0;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Couleurs de la solution */
        .rouge { color: red; } 
        .bleu { color: blue; } 
        .vert { color: green; } 
        .noir { color: black; }
    </style>
</head>

// ================================================================

const mots = donneesBrutes.trim().split(/\s+/).filter(m => m.includes('{R}'));
let motActuelObj = {};

function parserMot(motBrut) {
    let motDeBase = ""; let solutionHTML = ""; let lettreRouge = "";
    const regex = /({[RVB]})?([^{}\s\t]+)/g;
    let match;
    while ((match = regex.exec(motBrut)) !== null) {
        let tag = match[1]; let texte = match[2];
        let premiereLettre = texte[0]; let reste = texte.substring(1);
        if (tag === "{R}") {
            lettreRouge = premiereLettre; motDeBase += "?" + reste;
            solutionHTML += `<span class="rouge">${premiereLettre}</span><span class="noir">${reste}</span>`;
        } else if (tag === "{B}" || tag === "{V}") {
            let colorClass = tag === "{B}" ? "bleu" : "vert";
            solutionHTML += `<span class="${colorClass}">${premiereLettre}</span><span class="noir">${reste}</span>`;
        } else {
            motDeBase += texte; solutionHTML += `<span class="noir">${texte}</span>`;
        }
    }
    return { base: motDeBase, solution: solutionHTML, bonneLettre: lettreRouge };
}

function chargerNouveauMot() {
    const motDeBaseEl = document.getElementById('mot-de-base');
    const solutionEl = document.getElementById('solution-container');
    const messageEl = document.getElementById('message');
    const entreeEl = document.getElementById('entree-lettre');
    const btnSuivant = document.getElementById('btn-suivant');

    if (mots.length === 0) { motDeBaseEl.innerText = "Aucun mot trouvé"; return; }
    const index = Math.floor(Math.random() * mots.length);
    motActuelObj = parserMot(mots[index]);
    motDeBaseEl.innerText = motActuelObj.base;
    solutionEl.innerHTML = motActuelObj.solution;
    solutionEl.style.display = "none";
    messageEl.innerText = "";
    entreeEl.value = "";
    entreeEl.style.display = "inline-block";
    btnSuivant.style.display = "none";
    entreeEl.focus();
}

document.getElementById('entree-lettre').addEventListener('input', function() {
    if (this.value.length === 1) {
        const saisie = this.value.toUpperCase();
        const messageEl = document.getElementById('message');
        const solutionEl = document.getElementById('solution-container');
        const btnSuivant = document.getElementById('btn-suivant');

        if (saisie === motActuelObj.bonneLettre) {
            messageEl.innerText = "BRAVO !"; messageEl.className = "bravo";
        } else {
            messageEl.innerText = "ERREUR ! (C'était " + motActuelObj.bonneLettre + ")"; messageEl.className = "erreur";
        }
        solutionEl.style.display = "block";
        this.style.display = "none";
        btnSuivant.style.display = "block";
    }
});

chargerNouveauMot();
</script>
