const mots = donneesBrutes.trim().split(/\s+/).filter(m => m.includes('{R}'));
let motActuelObj = {};

function parserMot(motBrut) {
    let indexBalise = motBrut.indexOf('{R}');
    let avant = motBrut.substring(0, indexBalise);
    let apresBalise = motBrut.substring(indexBalise + 3); 
    
    // La lettre rouge est celle qui suit directement la balise
    let bonneLettre = apresBalise[0].toUpperCase();
    
    // On conserve ce qui pourrait rester après (cas de parenthèses ou autres lettres)
    let resteApres = apresBalise.substring(1);
    
    // Le mot affiché (le ? remplace la balise et la lettre rouge)
    let motAffiche = avant + "?" + resteApres;
    
    // La solution affiche le mot complet, lettre rouge mise en évidence
    let solutionHTML = `<span class="noir">${avant}</span><span class="rouge">${bonneLettre}</span><span class="noir">${resteApres}</span>`;
    
    return { base: motAffiche, solution: solutionHTML, bonneLettre: bonneLettre };
}

function chargerNouveauMot() {
    const motDeBaseEl = document.getElementById('mot-de-base');
    const solutionEl = document.getElementById('solution-container');
    const messageEl = document.getElementById('message');
    const entreeEl = document.getElementById('entree-lettre');
    const btnSuivant = document.getElementById('btn-suivant');

    if (mots.length === 0) { 
        motDeBaseEl.innerText = "Veuillez coller votre texte."; 
        return; 
    }
    
    const index = Math.floor(Math.random() * mots.length);
    motActuelObj = parserMot(mots[index]);
    
    motDeBaseEl.innerText = motActuelObj.base;
    solutionEl.innerHTML = motActuelObj.solution;
    
    solutionEl.style.display = "none";
    messageEl.innerText = "";
    entreeEl.value = "";
    entreeEl.style.display = "inline-block";
    btnSuivant.style.display = "none";
    entreeEl.focus();
}

document.getElementById('entree-lettre').addEventListener('input', function() {
    if (this.value.length === 1) {
        const saisie = this.value.toUpperCase();
        const messageEl = document.getElementById('message');
        const solutionEl = document.getElementById('solution-container');
        const btnSuivant = document.getElementById('btn-suivant');

        if (saisie === motActuelObj.bonneLettre) {
            messageEl.innerText = "BRAVO !"; 
            messageEl.className = "bravo";
        } else {
            messageEl.innerText = "ERREUR !"; 
            messageEl.className = "erreur";
        }
        solutionEl.style.display = "block";
        this.style.display = "none";
        btnSuivant.style.display = "block";
    }
});

chargerNouveauMot();
</script>
