        /************************************************************************
         * FIN DE LA ZONE DE COLLAGE - NE RIEN TOUCHER              *
         ************************************************************************/

        // Nettoyage strict
        let list = donneesTextuelles.trim().split('\n')
                      .filter(l => l.includes('=') && l.trim().length > 5);

        // Mélange aléatoire
        for (let i = list.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [list[i], list[j]] = [list[j], list[i]];
        }

        let id = 0;
        let clic = 0; 
        const box = document.getElementById('zone-jeu');

        function jouer() {
            if (id >= list.length) {
                box.innerHTML = "FIN";
                return;
            }

            const brute = list[id].trim();
            const split = brute.split('=');
            
            // On récupère uniquement les lettres du tirage (avant le +)
            const tirageSeul = split[0].split('+')[0].trim();
            
            // On récupère lettre et solution
            const suite = split[1].trim().split(/\s+/);
            const lettreJoker = suite[0];
            const motFinal = suite[1];

            // Alternance couleur
            box.className = (id % 2 === 0) ? 'jaune' : 'pistache';

            if (clic === 0) {
                // ETAPE 1 : TIRAGE + ? =
                box.innerHTML = tirageSeul + " + ? =";
            } 
            else if (clic === 1) {
                // ETAPE 2 : TIRAGE + LETTRE ROUGE = (avec espaces forcés)
                box.innerHTML = tirageSeul + ' + <span class="rouge">' + lettreJoker + '</span> =';
            } 
            else {
                // ETAPE 3 : MOT SEUL
                box.innerHTML = motFinal;
            }
        }

        box.addEventListener('click', () => {
            clic++;
            if (clic > 2) {
                clic = 0;
                id++;
            }
            jouer();
        });

        // LANCEMENT IMMEDIAT DU PREMIER TIRAGE SANS PAGE D'ACCUEIL
        if(list.length > 0) jouer();
        else box.innerHTML = "ERREUR : COLLE TES DONNÉES";

    </script>
