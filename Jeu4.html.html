// =========================================================

let pile = [];
let compteurCouleur = 0;
const zoneAffichage = document.getElementById('zone-affichage');

function extraire() {
    // Éclate les colonnes et les lignes
    let propre = texteBrut.replace(/\t/g, '\n').replace(/[ ]{2,}/g, '\n');
    let lignesRaw = propre.split('\n');
    
    pile = lignesRaw
        .map(l => l.trim())
        .filter(l => l.length > 5 && (l.includes('?') || l.includes('=')));
    
    document.getElementById('nb-tirages').innerText = pile.length.toLocaleString() + " TIRAGES JOKER DISPONIBLES";
}

function piocher() {
    if (pile.length === 0) extraire();
    if (pile.length === 0) return;

    const hasard = Math.floor(Math.random() * pile.length);
    const tirageComplet = pile[hasard];
    
    // Affichage immédiat du texte complet (plus de cache jaune)
    zoneAffichage.innerText = tirageComplet;
    
    // Alternance des couleurs Jaune / Vert
    if (compteurCouleur % 2 === 0) {
        zoneAffichage.style.backgroundColor = "yellow";
    } else {
        zoneAffichage.style.backgroundColor = "#90EE90"; // Vert
    }
    compteurCouleur++;
}

window.onload = extraire;
