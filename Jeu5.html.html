// =========================================================================

let pileTirages = [];
let compteurCouleur = 0; 

function extraire() {
    let texteVertical = texteBrut.replace(/\t/g, '\n').replace(/[ ]{2,}/g, '\n');
    let lignesRaw = texteVertical.split('\n');
    
    pileTirages = lignesRaw
        .map(l => l.trim())
        .filter(l => {
            const low = l.toLowerCase();
            return l.length > 2 && 
                   !low.startsWith("avec") && 
                   !low.startsWith("sans") &&
                   !low.includes("tirages") &&
                   !low.includes("verbes") &&
                   !l.includes("(?)") &&
                   l !== "=";
        });
    
    document.getElementById('compteur').innerText = pileTirages.length.toLocaleString() + " TIRAGES DISPONIBLES";
}

function piocher() {
    if (pileTirages.length === 0) extraire();
    if (pileTirages.length === 0) return;
    
    const hasard = Math.floor(Math.random() * pileTirages.length);
    let tirage = pileTirages[hasard];
    
    // Nettoyage de l'affichage
    let affichage = tirage.replace(/\s?\+\s?/g, " + ").replace(/\s?=\s?/g, " = ");
    
    const zone = document.getElementById('zone-affichage');
    zone.innerText = affichage;

    // Alternance Jaune / Vert
    if (compteurCouleur % 2 === 0) {
        zone.style.backgroundColor = "yellow";
    } else {
        zone.style.backgroundColor = "#90EE90"; 
    }
    compteurCouleur++;

    // Ajustement de taille
    if (affichage.length > 25) {
        zone.style.fontSize = "2.2em";
    } else if (affichage.length > 45) {
        zone.style.fontSize = "1.6em";
    } else {
        zone.style.fontSize = "3em";
    }
}

window.onload = extraire;
</script>
