// =================================================================

let listeMots = [];
let indexMot = 0;
let solutionVisible = false;
const couleursAlternees = ["yellow", "#7ECFF4"];
let indexC = 0;

function extraireEtDemarrer() {
    // Nettoyage et extraction
    listeMots = texteBrut.split(/\s+/)
                         .filter(m => m.length > 3 && isNaN(m));

    // Mélange (Shuffling)
    listeMots.sort(() => Math.random() - 0.5);

    if (listeMots.length > 0) {
        afficherNouveauMot();
    } else {
        document.getElementById('mot-affichage').innerText = "LISTE VIDE";
    }
}

function afficherNouveauMot() {
    solutionVisible = false;
    const mot = listeMots[indexMot];
    const finDuMot = mot.substring(3); 
    
    document.getElementById('mot-affichage').innerHTML = 
        `<span class="points-masque">●●●</span>${finDuMot}`;
}

function gererClic() {
    const affichage = document.getElementById('mot-affichage');
    const fond = document.getElementById('cadre-fond');

    if (!solutionVisible) {
        // 1er CLIC : Montre le mot entier
        affichage.innerText = listeMots[indexMot];
        solutionVisible = true;
    } else {
        // 2ème CLIC : Mot suivant
        indexMot = (indexMot + 1) % listeMots.length;
        indexC = (indexC + 1) % couleursAlternees.length;
        
        fond.style.backgroundColor = couleursAlternees[indexC];
        afficherNouveauMot();
    }
}
