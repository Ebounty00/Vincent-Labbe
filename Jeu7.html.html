    <title>Tirages joker avec lettres chères</title>
    <style>
        body {
            background-color: #7ECFF4; 
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-transform: uppercase;
            color: black;
            letter-spacing: 2px;
        }

        #jeu-container {
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        .cadre {
            background-color: yellow;
            color: black;
            border: 8px solid #000;
            padding: 60px 40px;
            min-width: 600px;
            max-width: 95vw;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            font-weight: bold;
            font-size: 4em; /* Taille du tirage noir */
            transition: transform 0.1s;
            line-height: 1.1;
        }

        .cadre:active { transform: scale(0.98); }

        .solution-texte {
            color: #d32f2f;
            display: block;
            margin-top: 15px;
            /* TAILLE ÉGALE AU TIRAGE (1em de la taille du parent) */
            font-size: 1em; 
            font-weight: bold;
            text-transform: uppercase; /* Forçage Majuscules */
        }

        #compteur {
            position: absolute;
            bottom: 30px;
            background: white;
            padding: 10px 25px;
            border: 3px solid black;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>

        // =========================================================

        let pile = [];
        let indexActuel = 0;
        let montrerSolution = false;
        const couleurs = ["yellow", "#befabe"]; /* Jaune et Vert Pistache */
        let couleurIndex = 0;

        function preparerJeu() {
            const lignes = texteSource.trim().split('\n');
            pile = lignes.map(l => l.trim()).filter(l => l.includes('('));
            
            if (pile.length === 0) {
                document.getElementById('affichage').innerHTML = "ERREUR :<br>TEXTE VIDE";
                return;
            }

            pile.sort(() => Math.random() - 0.5);
            document.getElementById('nb').innerText = pile.length;
            afficherTirage();
        }

        function afficherTirage() {
            const element = document.getElementById('affichage');
            if (indexActuel >= pile.length) {
                element.innerHTML = "FIN DE LA SÉRIE";
                return;
            }

            let ligne = pile[indexActuel];
            let question = ligne.split('(')[0].trim();
            
            element.innerHTML = question;
            element.style.backgroundColor = couleurs[couleurIndex % 2];
            montrerSolution = false;
        }

        function gererClic() {
            if (pile.length === 0) return;
            const element = document.getElementById('affichage');
            let ligne = pile[indexActuel];
            let question = ligne.split('(')[0].trim();
            
            // On récupère la solution et on force les MAJUSCULES
            let solution = '(' + ligne.split('(')[1].toUpperCase();

            if (!montrerSolution) {
                element.innerHTML = question + '<br><span class="solution-texte">' + solution + '</span>';
                montrerSolution = true;
            } else {
                indexActuel++;
                couleurIndex++;
                document.getElementById('nb').innerText = Math.max(0, pile.length - indexActuel);
                afficherTirage();
            }
        }

        preparerJeu();
