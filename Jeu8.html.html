        // =========================================================

        let pile = [];
        let indexActuel = 0;
        let montrerSolution = false;
        
        // Alternance de couleurs : Jaune et Vert Pistache
        const couleurs = ["yellow", "#befabe"]; 
        let couleurIndex = 0;

        function preparerJeu() {
            // Nettoyage des données et mélange aléatoire
            pile = rawData.trim().split('\n')
                          .map(l => l.trim())
                          .filter(l => l.length > 0 && l.includes('='));
            
            pile.sort(() => Math.random() - 0.5);
            document.getElementById('nb').innerText = pile.length;
        }

        function afficherTirage() {
            const element = document.getElementById('affichage');
            if (indexActuel >= pile.length) {
                element.innerHTML = "FIN DE LA SÉRIE";
                return;
            }

            let ligne = pile[indexActuel];
            
            // On isole le TIRAGE (tout ce qui est avant la solution finale)
            // On cherche la dernière parenthèse ouvrante du fichier [cite: 1]
            let positionSolution = ligne.lastIndexOf('(');
            let tirage = ligne.substring(0, positionSolution).trim();
            
            element.innerHTML = tirage;
            
            // Application de l'alternance de couleur au fond du cadre
            element.style.backgroundColor = couleurs[couleurIndex % 2];
            montrerSolution = false;
        }

        function gererClic() {
            // Si la pile est vide (premier clic), on initialise
            if (pile.length === 0) {
                preparerJeu();
                if (pile.length > 0) afficherTirage();
                return;
            }

            const element = document.getElementById('affichage');
            let ligne = pile[indexActuel];
            
            if (!montrerSolution) {
                // ÉTAPE SOLUTION : On affiche la ligne complète
                // Le tirage reste en noir, la solution (lettres de complément) passe en rouge
                let positionSolution = ligne.lastIndexOf('(');
                let tiragePartie = ligne.substring(0, positionSolution).trim();
                let solutionPartie = ligne.substring(positionSolution);

                element.innerHTML = tiragePartie + '<br><span class="solution-texte">' + solutionPartie.toUpperCase() + '</span>';
                montrerSolution = true;
            } else {
                // ÉTAPE SUIVANTE : On passe au tirage suivant
                indexActuel++;
                couleurIndex++; // Change la couleur pour le prochain tirage
                document.getElementById('nb').innerText = Math.max(0, pile.length - indexActuel);
                afficherTirage();
            }
        }
